<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>APEX TRADE</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{background:#090b14;color:#e8eaf6;font-family:'DM Sans',sans-serif;height:100%;overflow:hidden;}
.mono{font-family:'Space Mono',monospace;}
input[type=number]{-moz-appearance:textfield;}
input::-webkit-outer-spin-button,input::-webkit-inner-spin-button{-webkit-appearance:none;}
::-webkit-scrollbar{width:3px;}
::-webkit-scrollbar-thumb{background:#2d3158;border-radius:2px;}
#app{display:flex;flex-direction:column;height:100vh;height:100dvh;}
#topbar{background:rgba(13,16,33,0.98);border-bottom:1px solid #1e2240;padding:10px 16px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;z-index:50;}
#content{flex:1;overflow:hidden;position:relative;}
#bottomnav{background:rgba(13,16,33,0.98);border-top:1px solid #1e2240;display:flex;flex-shrink:0;z-index:50;}
.view{position:absolute;inset:0;overflow-y:auto;-webkit-overflow-scrolling:touch;display:none;}
.view.active{display:block;}
.nav-btn{flex:1;padding:10px 4px 8px;background:none;border:none;color:#4b5280;cursor:pointer;font-family:inherit;font-size:10px;font-weight:600;letter-spacing:0.06em;display:flex;flex-direction:column;align-items:center;gap:3px;transition:color 0.15s;}
.nav-btn.active{color:#a78bfa;}
.nav-icon{font-size:18px;line-height:1;}
.stock-card{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid rgba(30,34,64,0.6);cursor:pointer;}
.stock-card:active{background:rgba(124,58,237,0.1);}
.stock-card.selected{background:rgba(124,58,237,0.1);border-left:3px solid #7c3aed;}
.btn-buy{background:linear-gradient(135deg,#059669,#10b981);color:#fff;border:none;border-radius:12px;padding:16px;font-family:'Space Mono',monospace;font-weight:700;font-size:16px;letter-spacing:0.05em;cursor:pointer;flex:1;transition:transform 0.1s;}
.btn-sell{background:linear-gradient(135deg,#be123c,#ff4d6d);color:#fff;border:none;border-radius:12px;padding:16px;font-family:'Space Mono',monospace;font-weight:700;font-size:16px;letter-spacing:0.05em;cursor:pointer;flex:1;transition:transform 0.1s;}
.btn-buy:active,.btn-sell:active{transform:scale(0.97);}
.stepper{display:flex;align-items:center;background:#0d1021;border:1px solid #1e2240;border-radius:10px;overflow:hidden;}
.stepper-btn{background:none;border:none;color:#a78bfa;font-size:24px;padding:8px 18px;cursor:pointer;font-weight:300;line-height:1;}
.stepper-btn:active{background:rgba(124,58,237,0.15);}
.stepper input{background:none;border:none;color:#e8eaf6;font-family:'Space Mono',monospace;font-size:18px;font-weight:700;text-align:center;width:70px;outline:none;padding:10px 0;}
.card{background:rgba(255,255,255,0.02);border:1px solid #1e2240;border-radius:12px;padding:14px 16px;margin-bottom:10px;}
.ai-box{background:rgba(124,58,237,0.08);border:1px solid rgba(124,58,237,0.25);border-radius:10px;padding:12px 14px;font-size:13px;color:#c4b5fd;line-height:1.65;margin-top:10px;}
.badge{font-size:9px;padding:2px 6px;border-radius:4px;background:rgba(255,255,255,0.07);color:#6b7280;letter-spacing:0.04em;}
#toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);z-index:999;display:none;border-radius:10px;padding:12px 20px;font-size:13px;font-weight:600;box-shadow:0 8px 32px rgba(0,0,0,0.6);white-space:nowrap;animation:fadeUp 0.2s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateX(-50%) translateY(8px);}to{opacity:1;transform:translateX(-50%) translateY(0);}}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.3;}}
.live-dot{width:7px;height:7px;border-radius:50%;background:#00e5a0;display:inline-block;animation:pulse 1.5s infinite;}
#api-banner{background:linear-gradient(135deg,rgba(124,58,237,0.18),rgba(37,99,235,0.18));border-bottom:1px solid rgba(124,58,237,0.25);padding:10px 16px;display:flex;flex-wrap:wrap;gap:8px;align-items:center;justify-content:center;font-size:12px;color:#a78bfa;flex-shrink:0;}
#api-banner input{background:#0d1021;border:1px solid rgba(124,58,237,0.35);border-radius:7px;padding:6px 10px;color:#e8eaf6;font-family:inherit;font-size:12px;flex:1;min-width:140px;max-width:240px;outline:none;}
#api-banner button{background:linear-gradient(135deg,#7c3aed,#2563eb);color:#fff;border:none;border-radius:7px;padding:6px 14px;cursor:pointer;font-family:inherit;font-size:12px;font-weight:600;white-space:nowrap;}
.section-label{font-size:10px;color:#4b5280;letter-spacing:0.1em;padding:12px 16px 6px;text-transform:uppercase;}
.pos-card{background:rgba(255,255,255,0.02);border:1px solid #1e2240;border-radius:12px;padding:14px;margin-bottom:8px;cursor:pointer;}
.pos-card:active{background:rgba(124,58,237,0.08);}
.trade-rec{background:rgba(255,255,255,0.02);border:1px solid #1e2240;border-radius:10px;padding:12px 14px;margin-bottom:8px;}
.qty-preset{flex:1;background:rgba(255,255,255,0.05);border:1px solid #1e2240;border-radius:7px;padding:8px;color:#a5b4fc;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;}
.qty-preset:active{background:rgba(124,58,237,0.15);}
</style>
</head>
<body>
<div id="app">

  <div id="topbar">
    <div style="display:flex;align-items:center;gap:10px;">
      <div style="background:linear-gradient(135deg,#7c3aed,#2563eb);border-radius:8px;width:30px;height:30px;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0;">◈</div>
      <div>
        <div class="mono" style="font-weight:700;font-size:14px;letter-spacing:-0.02em;">APEX TRADE</div>
        <div style="font-size:9px;color:#4b5280;letter-spacing:0.08em;">PAPER TRADING</div>
      </div>
    </div>
    <div style="display:flex;gap:12px;align-items:center;">
      <div style="text-align:right;">
        <div style="font-size:9px;color:#4b5280;letter-spacing:0.06em;">VALUE</div>
        <div class="mono" style="font-size:15px;font-weight:700;" id="total-value">$100,000</div>
      </div>
      <div id="pl-badge" style="background:rgba(0,229,160,0.1);border:1px solid rgba(0,229,160,0.3);border-radius:8px;padding:5px 10px;text-align:center;">
        <div style="font-size:9px;color:#4b5280;">P&amp;L</div>
        <div class="mono" style="font-weight:700;font-size:13px;color:#00e5a0;" id="total-pl">+0.00%</div>
      </div>
    </div>
  </div>

  <div id="api-banner">
    <span>🔑 Finnhub key for live prices (optional)</span>
    <input type="text" id="api-key-input" placeholder="Paste API key..."/>
    <button onclick="connectFinnhub()">Connect</button>
    <span id="live-status" style="display:none;align-items:center;gap:5px;"><span class="live-dot"></span><span style="color:#00e5a0;font-size:11px;font-weight:700;">LIVE</span></span>
  </div>

  <div id="content">

    <!-- MARKETS -->
    <div class="view active" id="view-markets">
      <div class="section-label">Markets — tap a stock to trade</div>
      <div id="stock-list"></div>
      <div style="height:20px;"></div>
    </div>

    <!-- TRADE -->
    <div class="view" id="view-trade">
      <div style="padding:16px 16px 0;">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;">
          <div>
            <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;">
              <span class="mono" style="font-size:26px;font-weight:700;" id="sel-ticker">AAPL</span>
              <span id="sel-change-badge" style="border-radius:6px;padding:3px 9px;font-size:12px;font-weight:700;"></span>
            </div>
            <div style="color:#6b7280;font-size:13px;margin-top:2px;" id="sel-name">Apple Inc.</div>
          </div>
          <div style="text-align:right;">
            <div class="mono" style="font-size:28px;font-weight:700;letter-spacing:-0.02em;" id="sel-price">$0.00</div>
            <div style="font-size:12px;" id="sel-change-amt"></div>
          </div>
        </div>
        <svg id="main-chart" width="100%" viewBox="0 0 400 90" preserveAspectRatio="none" style="height:90px;margin-bottom:10px;border-radius:8px;"></svg>
      </div>

      <div style="padding:0 16px 110px;">
        <div id="holding-box" style="display:none;" class="card">
          <div style="display:flex;justify-content:space-between;align-items:center;">
            <div>
              <div style="font-size:10px;color:#4b5280;letter-spacing:0.08em;">YOUR POSITION</div>
              <div class="mono" style="font-weight:700;margin-top:2px;font-size:14px;" id="holding-info"></div>
            </div>
            <div style="text-align:right;">
              <div style="font-size:10px;color:#4b5280;">UNREALIZED P&amp;L</div>
              <div class="mono" style="font-weight:700;font-size:16px;" id="holding-pl"></div>
            </div>
          </div>
        </div>

        <div style="margin-bottom:14px;">
          <div style="font-size:10px;color:#4b5280;letter-spacing:0.08em;margin-bottom:8px;">SHARES</div>
          <div style="display:flex;align-items:center;gap:12px;margin-bottom:10px;">
            <div class="stepper">
              <button class="stepper-btn" onclick="changeQty(-1)">−</button>
              <input type="number" id="qty-input" min="1" value="1" oninput="updateTotal()"/>
              <button class="stepper-btn" onclick="changeQty(1)">+</button>
            </div>
            <div style="font-size:13px;color:#6b7280;" id="trade-total">= $0.00</div>
          </div>
          <div style="display:flex;gap:6px;">
            <button class="qty-preset" onclick="setQty(1)">1</button>
            <button class="qty-preset" onclick="setQty(5)">5</button>
            <button class="qty-preset" onclick="setQty(10)">10</button>
            <button class="qty-preset" onclick="setQty(25)">25</button>
            <button class="qty-preset" onclick="setMaxQty()" style="background:rgba(124,58,237,0.15);border-color:rgba(124,58,237,0.3);color:#a78bfa;">MAX</button>
          </div>
        </div>

        <div style="display:flex;gap:10px;margin-bottom:12px;">
          <button class="btn-buy" onclick="handleBuy()">▲ BUY</button>
          <button class="btn-sell" onclick="handleSell()">▼ SELL</button>
        </div>

        <div style="text-align:center;font-size:12px;color:#4b5280;margin-bottom:14px;">
          Cash available: <span class="mono" style="color:#a5b4fc;" id="cash-display2">$100,000.00</span>
        </div>

        <button onclick="fetchAIAnalysis()" style="width:100%;background:linear-gradient(135deg,#7c3aed,#2563eb);color:#fff;border:none;border-radius:10px;padding:14px;cursor:pointer;font-size:14px;font-family:inherit;font-weight:600;letter-spacing:0.03em;margin-bottom:6px;">✦ Get AI Analysis</button>
        <div id="ai-analysis-box" style="display:none;" class="ai-box">
          <div style="color:#a78bfa;font-weight:700;margin-bottom:6px;font-size:10px;letter-spacing:0.1em;">AI ANALYSIS</div>
          <div id="ai-analysis-text" style="font-size:13px;"></div>
          <button onclick="fetchAIAnalysis()" style="margin-top:10px;background:none;border:1px solid rgba(124,58,237,0.4);color:#a78bfa;border-radius:7px;padding:5px 12px;cursor:pointer;font-size:11px;font-family:inherit;">↻ Refresh</button>
        </div>
      </div>
    </div>

    <!-- PORTFOLIO -->
    <div class="view" id="view-portfolio">
      <div style="padding:12px 16px 110px;">
        <button onclick="fetchAIPortfolio()" style="width:100%;background:linear-gradient(135deg,#1e1b4b,#2e1065);border:1px solid rgba(124,58,237,0.4);color:#a78bfa;border-radius:10px;padding:12px;cursor:pointer;font-family:inherit;font-weight:600;font-size:13px;margin-bottom:8px;">✦ AI Portfolio Advice</button>
        <div id="ai-portfolio-box" style="display:none;" class="ai-box"><div id="ai-portfolio-text" style="font-size:13px;"></div></div>
        <div class="card" style="margin-top:10px;">
          <div style="display:flex;justify-content:space-between;margin-bottom:8px;">
            <span style="font-size:12px;color:#6b7280;">Cash</span>
            <span class="mono" style="font-size:12px;" id="port-cash">$100,000.00</span>
          </div>
          <div style="display:flex;justify-content:space-between;margin-bottom:8px;">
            <span style="font-size:12px;color:#6b7280;">Invested</span>
            <span class="mono" style="font-size:12px;" id="port-invested">$0.00</span>
          </div>
          <div style="border-top:1px solid #1e2240;padding-top:10px;display:flex;justify-content:space-between;">
            <span style="font-size:13px;font-weight:600;">Total P&amp;L</span>
            <span class="mono" style="font-size:14px;font-weight:700;" id="port-pl">+$0.00</span>
          </div>
        </div>
        <div id="positions-list"></div>
      </div>
    </div>

    <!-- HISTORY -->
    <div class="view" id="view-history">
      <div style="padding:12px 16px 110px;" id="history-list"></div>
    </div>

  </div>

  <div id="bottomnav">
    <button class="nav-btn active" id="nav-markets" onclick="showView('markets')">
      <span class="nav-icon">📈</span>MARKETS
    </button>
    <button class="nav-btn" id="nav-trade" onclick="showView('trade')">
      <span class="nav-icon">⚡</span>TRADE
    </button>
    <button class="nav-btn" id="nav-portfolio" onclick="showView('portfolio')">
      <span class="nav-icon">💼</span>PORTFOLIO
    </button>
    <button class="nav-btn" id="nav-history" onclick="showView('history')">
      <span class="nav-icon">📋</span>HISTORY
    </button>
  </div>
</div>

<div id="toast"></div>

<script>
const STARTING_CASH=100000;
const STOCKS={
  AAPL:{name:"Apple Inc.",price:189.45,sector:"Technology"},
  TSLA:{name:"Tesla Inc.",price:172.82,sector:"Automotive"},
  NVDA:{name:"NVIDIA Corp.",price:875.39,sector:"Technology"},
  MSFT:{name:"Microsoft Corp.",price:415.20,sector:"Technology"},
  AMZN:{name:"Amazon.com Inc.",price:182.75,sector:"Consumer"},
  GOOGL:{name:"Alphabet Inc.",price:163.40,sector:"Technology"},
  META:{name:"Meta Platforms",price:508.60,sector:"Technology"},
  SPY:{name:"S&P 500 ETF",price:521.34,sector:"ETF"},
  AMD:{name:"AMD Inc.",price:162.30,sector:"Technology"},
  BTC:{name:"Bitcoin ETF",price:62450.00,sector:"Crypto"},
};
let cash=STARTING_CASH,portfolio={},trades=[],prices={},changes={},histories={};
let selectedTicker="AAPL",currentView="markets",finnhubWS=null,isLive=false,tickCount=0;

Object.entries(STOCKS).forEach(([t,d])=>{
  prices[t]=d.price;changes[t]=(Math.random()-0.48)*d.price*0.02;histories[t]=genHistory(d.price,50);
});

function genHistory(base,days){
  let h=[],p=base*0.85;
  for(let i=days;i>=0;i--){p=p*(1+(Math.random()-0.48)*0.03);h.push({price:parseFloat(p.toFixed(2))});}
  return h;
}
function fmt(n){return n.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});}
function fmtShort(n){return n>=1e6?'$'+(n/1e6).toFixed(2)+'M':n>=1000?'$'+(n/1000).toFixed(1)+'k':'$'+fmt(n);}

function showView(v){
  currentView=v;
  document.querySelectorAll('.view').forEach(el=>el.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(el=>el.classList.remove('active'));
  document.getElementById('view-'+v).classList.add('active');
  document.getElementById('nav-'+v).classList.add('active');
  renderAll();
}

function selectStock(t){selectedTicker=t;showView('trade');}

function connectFinnhub(){
  const key=document.getElementById('api-key-input').value.trim();
  if(!key){showToast('Enter an API key first','error');return;}
  if(finnhubWS) finnhubWS.close();
  finnhubWS=new WebSocket('wss://ws.finnhub.io?token='+key);
  finnhubWS.onopen=()=>{
    Object.keys(STOCKS).forEach(t=>finnhubWS.send(JSON.stringify({type:'subscribe',symbol:t==='BTC'?'BINANCE:BTCUSDT':t})));
    isLive=true;
    const ls=document.getElementById('live-status');ls.style.display='flex';ls.style.alignItems='center';ls.style.gap='5px';
    showToast('Live data connected!');
  };
  finnhubWS.onmessage=(e)=>{
    const d=JSON.parse(e.data);
    if(d.type==='trade'&&d.data){
      d.data.forEach(tr=>{
        let t=tr.s==='BINANCE:BTCUSDT'?'BTC':tr.s;
        if(STOCKS[t]){changes[t]=parseFloat((tr.p-prices[t]).toFixed(2));prices[t]=parseFloat(tr.p.toFixed(2));histories[t].push({price:prices[t]});if(histories[t].length>60)histories[t].shift();renderAll();}
      });
    }
  };
  finnhubWS.onerror=()=>{showToast('Connection error','error');isLive=false;};
  finnhubWS.onclose=()=>{isLive=false;document.getElementById('live-status').style.display='none';};
}

setInterval(()=>{
  if(isLive) return;
  tickCount++;
  Object.keys(STOCKS).forEach(t=>{
    const delta=prices[t]*(Math.random()-0.499)*0.004;
    prices[t]=parseFloat(Math.max(1,prices[t]+delta).toFixed(2));
    changes[t]=parseFloat((prices[t]-STOCKS[t].price).toFixed(2));
    if(tickCount%5===0){histories[t].push({price:prices[t]});if(histories[t].length>60)histories[t].shift();}
  });
  renderAll();
},1500);

function renderAll(){
  updateHeader();
  if(currentView==='markets') renderMarkets();
  else if(currentView==='trade') renderTrade();
  else if(currentView==='portfolio') renderPortfolio();
  else if(currentView==='history') renderHistory();
}

function updateHeader(){
  const invested=Object.entries(portfolio).reduce((s,[t,p])=>s+p.shares*prices[t],0);
  const total=cash+invested,pl=total-STARTING_CASH,plPct=((pl/STARTING_CASH)*100).toFixed(2);
  document.getElementById('total-value').textContent=fmtShort(total);
  document.getElementById('total-pl').textContent=(pl>=0?'+':'')+plPct+'%';
  document.getElementById('total-pl').style.color=pl>=0?'#00e5a0':'#ff4d6d';
  document.getElementById('pl-badge').style.background=pl>=0?'rgba(0,229,160,0.1)':'rgba(255,77,109,0.1)';
  document.getElementById('pl-badge').style.border='1px solid '+(pl>=0?'rgba(0,229,160,0.3)':'rgba(255,77,109,0.3)');
}

function miniSparkline(t,positive){
  const h=histories[t];if(!h||h.length<2) return '';
  const arr=h.map(x=>x.price),min=Math.min(...arr),max=Math.max(...arr),range=max-min||1,W=60,H=28;
  const pts=arr.map((p,i)=>`${(i/(arr.length-1))*W},${H-((p-min)/range)*H}`).join(' ');
  return `<svg width="${W}" height="${H}"><polyline points="${pts}" fill="none" stroke="${positive?'#00e5a0':'#ff4d6d'}" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
}

function renderMarkets(){
  document.getElementById('stock-list').innerHTML=Object.entries(STOCKS).map(([t,d])=>{
    const p=prices[t],chg=changes[t],pct=((chg/STOCKS[t].price)*100).toFixed(2),pos=chg>=0,sel=t===selectedTicker,held=portfolio[t];
    return `<div class="stock-card${sel?' selected':''}" onclick="selectStock('${t}')">
      <div style="flex:1;min-width:0;">
        <div style="display:flex;align-items:center;gap:6px;">
          <span class="mono" style="font-weight:700;font-size:14px;color:${sel?'#a78bfa':'#e8eaf6'};">${t}</span>
          <span class="badge">${d.sector}</span>
          ${held?`<span style="font-size:9px;color:#a78bfa;background:rgba(124,58,237,0.15);border-radius:3px;padding:1px 5px;">${held.shares}sh</span>`:''}
        </div>
        <div style="font-size:11px;color:#4b5280;margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${d.name}</div>
      </div>
      <div style="display:flex;align-items:center;gap:10px;">
        <div style="width:60px;">${miniSparkline(t,pos)}</div>
        <div style="text-align:right;min-width:72px;">
          <div class="mono" style="font-size:13px;font-weight:700;">$${fmt(p)}</div>
          <div style="font-size:11px;color:${pos?'#00e5a0':'#ff4d6d'};font-weight:600;">${pos?'▲':'▼'}${Math.abs(pct)}%</div>
        </div>
      </div>
    </div>`;
  }).join('');
}

function renderTrade(){
  const t=selectedTicker,p=prices[t],chg=changes[t],pct=((chg/STOCKS[t].price)*100).toFixed(2),pos=chg>=0;
  document.getElementById('sel-ticker').textContent=t;
  document.getElementById('sel-name').textContent=STOCKS[t].name;
  document.getElementById('sel-price').textContent='$'+fmt(p);
  const badge=document.getElementById('sel-change-badge');
  badge.textContent=`${pos?'▲':'▼'} ${Math.abs(pct)}%`;
  badge.style.cssText=`border-radius:6px;padding:3px 9px;font-size:12px;font-weight:700;background:${pos?'rgba(0,229,160,0.15)':'rgba(255,77,109,0.15)'};color:${pos?'#00e5a0':'#ff4d6d'};`;
  document.getElementById('sel-change-amt').textContent=(pos?'+':'')+chg.toFixed(2)+' today';
  document.getElementById('sel-change-amt').style.color=pos?'#00e5a0':'#ff4d6d';
  document.getElementById('cash-display2').textContent='$'+fmt(cash);
  updateTotal(); drawChart(t);
  const holding=portfolio[t];
  if(holding){
    const pl=(p-holding.avgPrice)*holding.shares;
    document.getElementById('holding-box').style.display='block';
    document.getElementById('holding-info').textContent=`${holding.shares} shares @ $${fmt(holding.avgPrice)}`;
    document.getElementById('holding-pl').textContent=(pl>=0?'+':'')+'$'+fmt(pl);
    document.getElementById('holding-pl').style.color=pl>=0?'#00e5a0':'#ff4d6d';
  } else document.getElementById('holding-box').style.display='none';
}

function drawChart(t){
  const h=histories[t];if(!h||h.length<2) return;
  const arr=h.map(x=>x.price),min=Math.min(...arr),max=Math.max(...arr),range=max-min||1,W=400,H=90;
  const pts=arr.map((p,i)=>`${(i/(arr.length-1))*W},${H-((p-min)/range)*H}`).join(' ');
  const fill=`0,${H} ${pts} ${W},${H}`;
  const col=arr[arr.length-1]>=arr[0]?'#00e5a0':'#ff4d6d';
  document.getElementById('main-chart').innerHTML=`<defs><linearGradient id="cg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="${col}" stop-opacity="0.25"/><stop offset="100%" stop-color="${col}" stop-opacity="0"/></linearGradient></defs><polygon points="${fill}" fill="url(#cg)"/><polyline points="${pts}" fill="none" stroke="${col}" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>`;
}

function renderPortfolio(){
  const invested=Object.entries(portfolio).reduce((s,[t,p])=>s+p.shares*prices[t],0);
  const total=cash+invested,pl=total-STARTING_CASH;
  document.getElementById('port-cash').textContent='$'+fmt(cash);
  document.getElementById('port-invested').textContent='$'+fmt(invested);
  const plEl=document.getElementById('port-pl');plEl.textContent=(pl>=0?'+':'')+'$'+fmt(pl);plEl.style.color=pl>=0?'#00e5a0':'#ff4d6d';
  const list=document.getElementById('positions-list');
  if(!Object.keys(portfolio).length){list.innerHTML='<div style="color:#4b5280;font-size:13px;text-align:center;margin-top:30px;">No positions yet.<br/>Go to Markets to start trading!</div>';return;}
  list.innerHTML=Object.entries(portfolio).map(([t,pos])=>{
    const p=prices[t],pl=(p-pos.avgPrice)*pos.shares,plPct=((p-pos.avgPrice)/pos.avgPrice*100).toFixed(2),positive=pl>=0;
    return `<div class="pos-card" onclick="selectStock('${t}')">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
        <div style="display:flex;align-items:center;gap:8px;">
          <span class="mono" style="font-weight:700;font-size:15px;color:#a78bfa;">${t}</span>
          <span class="badge">${STOCKS[t].sector}</span>
        </div>
        <span class="mono" style="font-weight:700;font-size:14px;">$${fmt(p*pos.shares)}</span>
      </div>
      <div style="display:flex;justify-content:space-between;align-items:center;">
        <div><span style="font-size:12px;color:#6b7280;">${pos.shares} shares</span><span style="font-size:11px;color:#4b5280;margin-left:6px;">avg $${fmt(pos.avgPrice)}</span></div>
        <div style="text-align:right;"><div style="font-size:13px;font-weight:700;color:${positive?'#00e5a0':'#ff4d6d'};">${positive?'+':''}$${fmt(pl)}</div><div style="font-size:11px;color:${positive?'#00e5a0':'#ff4d6d'};">${positive?'+':''}${plPct}%</div></div>
      </div>
      <div style="margin-top:8px;">${miniSparkline(t,positive)}</div>
    </div>`;
  }).join('');
}

function renderHistory(){
  const el=document.getElementById('history-list');
  if(!trades.length){el.innerHTML='<div style="color:#4b5280;font-size:13px;text-align:center;margin-top:40px;">No trades yet.</div>';return;}
  el.innerHTML=trades.map(tr=>`<div class="trade-rec">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:5px;">
      <div style="display:flex;align-items:center;gap:8px;">
        <span style="font-size:10px;padding:2px 8px;border-radius:4px;font-weight:700;background:${tr.type==='BUY'?'rgba(16,185,129,0.15)':'rgba(255,77,109,0.15)'};color:${tr.type==='BUY'?'#10b981':'#ff4d6d'};">${tr.type}</span>
        <span class="mono" style="font-weight:700;font-size:14px;">${tr.ticker}</span>
      </div>
      <span style="font-size:11px;color:#4b5280;">${tr.time}</span>
    </div>
    <div style="display:flex;justify-content:space-between;">
      <span style="font-size:12px;color:#6b7280;">${tr.shares} shares @ $${fmt(tr.price)}</span>
      <span class="mono" style="font-weight:700;font-size:13px;">$${fmt(tr.total)}</span>
    </div>
  </div>`).join('');
}

function getQty(){return Math.max(1,parseInt(document.getElementById('qty-input').value)||1);}
function setQty(n){document.getElementById('qty-input').value=n;updateTotal();}
function changeQty(d){setQty(Math.max(1,getQty()+d));}
function setMaxQty(){setQty(Math.max(1,Math.floor(cash/prices[selectedTicker])));}
function updateTotal(){document.getElementById('trade-total').textContent='= $'+fmt(prices[selectedTicker]*getQty());}

function handleBuy(){
  const qty=getQty(),price=prices[selectedTicker],cost=price*qty;
  if(cost>cash){showToast('Not enough cash!','error');return;}
  cash=parseFloat((cash-cost).toFixed(2));
  if(portfolio[selectedTicker]){const ex=portfolio[selectedTicker],tot=ex.shares+qty,avg=((ex.shares*ex.avgPrice)+(qty*price))/tot;portfolio[selectedTicker]={shares:tot,avgPrice:parseFloat(avg.toFixed(2))};}
  else portfolio[selectedTicker]={shares:qty,avgPrice:price};
  trades.unshift({id:Date.now(),type:'BUY',ticker:selectedTicker,shares:qty,price,total:cost,time:new Date().toLocaleTimeString()});
  showToast('Bought '+qty+' '+selectedTicker+' @ $'+fmt(price));
  renderAll();
}

function handleSell(){
  const qty=getQty(),holding=portfolio[selectedTicker];
  if(!holding||holding.shares<qty){showToast('Not enough shares!','error');return;}
  const price=prices[selectedTicker],proceeds=price*qty;
  cash=parseFloat((cash+proceeds).toFixed(2));
  const rem=holding.shares-qty;
  if(rem===0) delete portfolio[selectedTicker];
  else portfolio[selectedTicker]={...holding,shares:rem};
  trades.unshift({id:Date.now(),type:'SELL',ticker:selectedTicker,shares:qty,price,total:proceeds,time:new Date().toLocaleTimeString()});
  showToast('Sold '+qty+' '+selectedTicker+' @ $'+fmt(price));
  renderAll();
}

async function fetchAIAnalysis(){
  const box=document.getElementById('ai-analysis-box'),txt=document.getElementById('ai-analysis-text');
  box.style.display='block';txt.textContent='Analyzing '+selectedTicker+'...';
  const holding=portfolio[selectedTicker];
  const prompt=`You are a concise AI stock trading analyst. Give a SHORT 3-sentence analysis of ${selectedTicker} (${STOCKS[selectedTicker].name}).
Current price: $${prices[selectedTicker].toFixed(2)}, Change: ${changes[selectedTicker]>=0?'+':''}${changes[selectedTicker].toFixed(2)}. Sector: ${STOCKS[selectedTicker].sector}.
${holding?`User holds ${holding.shares} shares at avg $${holding.avgPrice.toFixed(2)}.`:'User does not hold this stock.'} Cash: $${cash.toFixed(2)}.
Give BUY, SELL, or HOLD with brief reasoning. End with risk: LOW, MEDIUM, or HIGH.`;
  try{
    const res=await fetch('https://api.groq.com/openai/v1/chat/completions',{method:'POST',headers:{'Content-Type':'application/json','Authorization':`Bearer ${env.GROQ_API_KEY}`},body:JSON.stringify({model:'mixtral-8x7b-32768',max_tokens:1000,messages:[{role:'user',content:prompt}]})});
    const data=await res.json();txt.textContent=data.choices?.[0]?.message?.content||'No analysis.';
  }catch{txt.textContent='Failed to load analysis.';}
}

async function fetchAIPortfolio(){
  const box=document.getElementById('ai-portfolio-box'),txt=document.getElementById('ai-portfolio-text');
  if(!box||!txt) return;box.style.display='block';txt.textContent='Analyzing portfolio...';
  const invested=Object.entries(portfolio).reduce((s,[t,p])=>s+p.shares*prices[t],0),total=cash+invested,pl=total-STARTING_CASH;
  const summary=Object.entries(portfolio).map(([t,pos])=>`${t}: ${pos.shares}sh avg $${pos.avgPrice.toFixed(2)}, now $${prices[t].toFixed(2)}, P&L: ${((prices[t]-pos.avgPrice)/pos.avgPrice*100).toFixed(1)}%`).join('; ')||'No positions';
  const prompt=`AI portfolio advisor. One specific actionable suggestion (2-3 sentences).
Total: $${total.toFixed(2)} | Cash: $${cash.toFixed(2)} | P&L: ${pl>=0?'+':''}$${pl.toFixed(2)}
Holdings: ${summary}. Available: ${Object.keys(STOCKS).join(', ')}`;
  try{
    const res=await fetch('https://api.groq.com/openai/v1/chat/completions',{method:'POST',headers:{'Content-Type':'application/json','Authorization':`Bearer ${env.GROQ_API_KEY}`},body:JSON.stringify({model:'mixtral-8x7b-32768',max_tokens:1000,messages:[{role:'user',content:prompt}]})});
    const data=await res.json();txt.textContent=data.choices?.[0]?.message?.content||'No suggestion.';
  }catch{txt.textContent='Failed to load suggestion.';}
}

function showToast(msg,type='success'){
  const t=document.getElementById('toast');
  t.textContent=msg;t.style.background=type==='error'?'#7f1d1d':'#064e3b';
  t.style.border='1px solid '+(type==='error'?'#ef4444':'#10b981');
  t.style.color='#fff';t.style.display='block';
  setTimeout(()=>t.style.display='none',3000);
}

renderAll();
</script>
